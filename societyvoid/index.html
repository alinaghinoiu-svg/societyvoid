<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SOCIETY VOID</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --void:#000000;--violet:#7b2fff;--violet-soft:#a855f7;--violet-dim:rgba(123,47,255,0.15);
  --star:#e8e0ff;--text:#d4c8ff;--text-dim:rgba(212,200,255,0.75);
}
html,body{background:var(--void);color:var(--text);font-family:'Outfit',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes float-in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3;transform:scale(0.8)}}
@keyframes breathe{0%,100%{opacity:0.2}50%{opacity:0.7}}
@keyframes scanline{0%,100%{opacity:0.2}50%{opacity:0.9}}
@keyframes globe-rotate{0%{transform:rotateY(0deg)}100%{transform:rotateY(360deg)}}
@keyframes orbit-dot{0%{transform:rotate(0deg) translateX(82px)}100%{transform:rotate(360deg) translateX(82px)}}
@keyframes orbit-dot2{0%{transform:rotate(180deg) translateX(82px)}100%{transform:rotate(540deg) translateX(82px)}}
@keyframes center-pulse{0%,100%{r:3;opacity:0.95}50%{r:5;opacity:0.6}}
@keyframes diamond-breathe{0%,100%{opacity:0.8;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes splash-float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}

/* STARFIELD */
#starfield{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0;transition:opacity 2s ease;}

/* PARTICLES */
#particles-canvas{position:fixed;inset:0;z-index:999;pointer-events:none;transition:opacity 0.5s;}

/* SPLASH */
#splash{
  position:fixed;inset:0;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:1000;cursor:pointer;gap:0;
  transition:opacity 1.2s ease;
}
.splash-globe{
  animation:splash-float 4s ease-in-out infinite;
  margin-bottom:32px;
}
.splash-name{
  font-size:clamp(16px,4vw,22px);font-weight:100;
  letter-spacing:0.6em;color:rgba(232,224,255,0.7);
  text-transform:uppercase;margin-bottom:8px;
}
.splash-sub{
  font-size:9px;letter-spacing:0.35em;color:var(--text-dim);
  animation:breathe 3s ease-in-out infinite;
  text-transform:uppercase;
}

/* APP */
#app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:48px 20px 100px;opacity:0;transition:opacity 1s ease 0.3s;}
#app.visible{opacity:1;}

/* HEADER */
.sv-header{text-align:center;margin-bottom:52px;}
.sv-logo-wrap{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:16px;}
.sv-logo-text{font-size:clamp(20px,5vw,32px);font-weight:100;letter-spacing:0.45em;color:var(--star);text-transform:uppercase;position:relative;}
.sv-logo-text::after{content:'';position:absolute;bottom:-6px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--violet),transparent);animation:scanline 4s ease-in-out infinite;}
.sv-tagline{font-size:11px;letter-spacing:0.18em;color:rgba(210,195,255,0.8);text-transform:uppercase;margin-top:14px;}
.sv-dot{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--violet);margin:0 8px;animation:pulse 2s ease-in-out infinite;}

/* PANELS */
.sv-panel{background:rgba(0,0,0,0.7);border:1px solid rgba(123,47,255,0.1);border-radius:2px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden;transition:border-color 0.4s ease;}
.sv-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(123,47,255,0.5),transparent);transform:translateX(-100%);transition:transform 0.9s ease;}
.sv-panel:hover::before{transform:translateX(100%);}
.sv-panel:hover{border-color:rgba(123,47,255,0.25);}
.sv-label{font-size:10px;letter-spacing:0.25em;color:rgba(200,185,255,0.85);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.sv-label::before{content:'◇';font-size:7px;color:var(--violet);animation:pulse 3s ease-in-out infinite;}

/* INPUT */
.sv-input{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(123,47,255,0.12);padding:12px 0;color:var(--star);font-size:14px;font-family:'Outfit',sans-serif;font-weight:300;line-height:1.7;letter-spacing:0.04em;resize:none;outline:none;transition:border-color 0.4s;}
.sv-input:focus{border-bottom-color:rgba(123,47,255,0.45);}
.sv-input::placeholder{color:rgba(180,160,255,0.5);font-style:italic;}

/* CHIPS */
.sv-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px;}
.sv-chip{background:transparent;border:1px solid rgba(123,47,255,0.35);border-radius:1px;padding:3px 11px;color:rgba(200,180,255,0.75);font-size:8px;letter-spacing:0.15em;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:300;transition:all 0.3s;text-transform:uppercase;}
.sv-chip:hover{border-color:rgba(123,47,255,0.45);color:var(--violet-soft);}

/* CULTURES */
.sv-cultures{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sv-cul{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-left:3px solid transparent;border-radius:4px;padding:11px 13px;cursor:pointer;text-align:left;transition:all 0.25s ease;position:relative;overflow:hidden;}
.sv-cul:hover{background:rgba(123,47,255,0.08);border-color:rgba(123,47,255,0.3);}
.sv-cul.on{background:rgba(123,47,255,0.15);border-left-color:#a855f7;border-color:rgba(168,85,247,0.5);box-shadow:0 0 16px rgba(123,47,255,0.2),inset 0 0 20px rgba(123,47,255,0.08);}
.sv-cul-flag{font-size:22px;margin-bottom:6px;line-height:1;}
.sv-cul-name{font-size:11px;letter-spacing:0.12em;color:rgba(210,195,255,0.75);font-weight:400;text-transform:uppercase;transition:color 0.25s;}
.sv-cul.on .sv-cul-name{color:#e0d0ff;font-weight:500;}
.sv-cul-check{position:absolute;top:8px;right:8px;width:16px;height:16px;border-radius:50%;border:1px solid rgba(123,47,255,0.3);display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all 0.25s;}
.sv-cul.on .sv-cul-check{background:#a855f7;border-color:#a855f7;color:#fff;}
.sv-cul-desc{font-size:9px;color:rgba(180,150,255,0.6);margin-top:3px;line-height:1.4;}

/* BUTTON */
.sv-btn{width:100%;padding:17px;background:transparent;border:1px solid rgba(123,47,255,0.32);border-radius:1px;color:var(--violet-soft);font-size:9px;letter-spacing:0.42em;font-weight:300;cursor:pointer;font-family:'Outfit',sans-serif;text-transform:uppercase;margin-bottom:18px;position:relative;overflow:hidden;transition:all 0.4s ease;}
.sv-btn::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 120%,rgba(123,47,255,0.12) 0%,transparent 60%);opacity:0;transition:opacity 0.4s;}
.sv-btn:hover::before{opacity:1;}
.sv-btn:hover{border-color:rgba(123,47,255,0.65);box-shadow:0 0 28px rgba(123,47,255,0.12),inset 0 0 28px rgba(123,47,255,0.04);color:var(--star);}
.sv-btn:disabled{opacity:0.25;cursor:not-allowed;border-color:rgba(123,47,255,0.08);}

/* LOADING */
.sv-loading{display:flex;align-items:center;justify-content:center;gap:14px;padding:36px 0;color:var(--text-dim);font-size:9px;letter-spacing:0.32em;text-transform:uppercase;}
.sv-orbit{width:18px;height:18px;border-radius:50%;border:1px solid rgba(123,47,255,0.18);border-top-color:var(--violet);animation:spin 2s linear infinite;}

/* ERROR */
.sv-error{border:1px solid rgba(255,45,85,0.18);padding:13px 17px;margin-bottom:18px;color:rgba(255,100,130,0.75);font-size:10px;letter-spacing:0.1em;line-height:1.6;}

/* DIVIDER */
.sv-divider{display:flex;align-items:center;gap:14px;margin:6px 0 32px;}
.sv-div-line{flex:1;height:1px;background:rgba(123,47,255,0.08);}
.sv-div-text{font-size:7px;letter-spacing:0.42em;color:rgba(180,120,255,0.8);text-transform:uppercase;}

/* EMOTIONS */
.sv-emotions{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:26px;}
.sv-epill{border-radius:1px;padding:9px 13px;display:flex;flex-direction:column;align-items:center;min-width:76px;animation:float-in 0.6s ease both;}
.sv-ename{font-size:8px;letter-spacing:0.25em;font-weight:300;text-transform:uppercase;margin-bottom:3px;}
.sv-epct{font-size:20px;font-weight:100;letter-spacing:0.08em;}
.sv-eatt{font-size:7px;color:var(--text-dim);margin-top:3px;text-align:center;line-height:1.4;}

/* CULTURE CARDS */
.sv-ccard{border-left:1px solid;padding:18px 18px 18px 20px;margin-bottom:12px;animation:float-in 0.5s ease both;}
.sv-ccard-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:12px;}
.sv-cflag{font-size:17px;margin-top:2px;}
.sv-cname{font-size:12px;font-weight:300;letter-spacing:0.22em;text-transform:uppercase;color:var(--star);}
.sv-cemotion{font-size:7px;letter-spacing:0.32em;margin-top:4px;display:flex;align-items:center;gap:5px;}
.sv-pulse{display:inline-block;width:4px;height:4px;border-radius:50%;animation:pulse 2s infinite;}
.sv-cprofile{font-size:11px;line-height:1.8;color:rgba(212,200,255,0.85);font-style:italic;margin-bottom:12px;font-weight:300;letter-spacing:0.03em;}
.sv-attitude{font-size:8px;letter-spacing:0.2em;color:rgba(200,150,255,0.9);border-left:1px solid rgba(123,47,255,0.18);padding-left:11px;margin-bottom:14px;text-transform:uppercase;}
.sv-attitude span{color:rgba(212,200,255,0.8);font-weight:300;}

/* BARS */
.sv-bar{margin-bottom:11px;}
.sv-bar-meta{display:flex;justify-content:space-between;margin-bottom:4px;}
.sv-bar-name{font-size:10px;letter-spacing:0.12em;color:rgba(200,185,255,0.8);text-transform:uppercase;}
.sv-bar-val{font-size:9px;font-weight:300;letter-spacing:0.1em;}
.sv-bar-track{height:2px;background:rgba(255,255,255,0.03);}
.sv-bar-fill{height:100%;}

/* FORECAST */
.sv-forecast-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px;}
.sv-fbox{padding:13px;border:1px solid rgba(123,47,255,0.07);}
.sv-ftitle{font-size:7px;letter-spacing:0.32em;text-transform:uppercase;margin-bottom:7px;}
.sv-ftext{font-size:10px;color:rgba(212,200,255,0.78);line-height:1.7;font-weight:300;font-style:italic;}
.sv-sectors{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px;}
.sv-sector-title{font-size:7px;letter-spacing:0.32em;margin-bottom:7px;text-transform:uppercase;}
.sv-sector-tag{font-size:8px;padding:4px 9px;margin-bottom:4px;letter-spacing:0.1em;border-left:1px solid;}
.sv-opp{display:flex;align-items:center;justify-content:space-between;}
.sv-opp-track{width:90px;height:2px;background:rgba(255,255,255,0.04);margin:0 11px;}
.sv-opp-fill{height:100%;background:linear-gradient(90deg,rgba(123,47,255,0.5),rgba(168,85,247,0.9));}
.sv-opp-score{font-size:12px;font-weight:100;color:var(--violet-soft);}

/* VERDICT */
.sv-verdict{border:1px solid rgba(123,47,255,0.1);padding:20px;margin-bottom:26px;position:relative;}
.sv-verdict::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(123,47,255,0.45),transparent);}
.sv-verdict-label{font-size:9px;letter-spacing:0.2em;color:rgba(200,160,255,0.85);text-transform:uppercase;margin-bottom:12px;}
.sv-verdict-text{font-size:13px;line-height:1.95;color:rgba(212,200,255,0.9);font-style:italic;font-weight:300;letter-spacing:0.03em;}

.sv-reset{width:100%;padding:13px;background:transparent;border:1px solid rgba(123,47,255,0.25);color:rgba(200,180,255,0.7);font-size:8px;letter-spacing:0.32em;cursor:pointer;font-family:'Outfit',sans-serif;text-transform:uppercase;transition:all 0.3s;}
.sv-reset:hover{border-color:rgba(123,47,255,0.18);color:var(--violet-soft);}
.sv-footer{text-align:center;margin-top:56px;font-size:7px;letter-spacing:0.42em;color:rgba(123,47,255,0.12);text-transform:uppercase;}
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<canvas id="particles-canvas"></canvas>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-globe">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="160" height="160">
      <defs>
        <radialGradient id="globeGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#4a0080" stop-opacity="0.7"/>
          <stop offset="60%" stop-color="#1a0035" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#bf7fff" stop-opacity="1"/>
          <stop offset="40%" stop-color="#7b2fff" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#3d0080" stop-opacity="0"/>
        </radialGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="softglow"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <clipPath id="cc"><circle cx="100" cy="100" r="72"/></clipPath>
      </defs>
      <circle cx="100" cy="100" r="90" fill="url(#globeGlow)"/>
      <circle cx="100" cy="100" r="72" fill="rgba(6,0,16,0.92)"/>
      <circle cx="100" cy="100" r="72" fill="none" stroke="#7b2fff" stroke-width="0.5" opacity="0.45"/>
      <!-- Latitude lines -->
      <g clip-path="url(#cc)" opacity="0.2" stroke="#a855f7" stroke-width="0.4" fill="none">
        <ellipse cx="100" cy="100" rx="72" ry="20"/>
        <ellipse cx="100" cy="100" rx="72" ry="42"/>
        <ellipse cx="100" cy="100" rx="72" ry="62"/>
        <line x1="28" y1="100" x2="172" y2="100"/>
      </g>
      <!-- Longitude lines -->
      <g clip-path="url(#cc)" opacity="0.2" stroke="#a855f7" stroke-width="0.4" fill="none">
        <ellipse cx="100" cy="100" rx="20" ry="72"/>
        <ellipse cx="100" cy="100" rx="42" ry="72"/>
        <ellipse cx="100" cy="100" rx="62" ry="72"/>
        <line x1="100" y1="28" x2="100" y2="172"/>
      </g>
      <!-- Stars on globe -->
      <g filter="url(#glow)" opacity="0.85">
        <circle cx="100" cy="46" r="1.5" fill="#e8d5ff"/>
        <circle cx="116" cy="57" r="1" fill="#c4a0ff"/>
        <circle cx="87" cy="61" r="1.2" fill="#d4b8ff"/>
        <circle cx="124" cy="73" r="0.8" fill="#a855f7"/>
        <circle cx="77" cy="69" r="1" fill="#c4a0ff"/>
        <circle cx="149" cy="84" r="1.2" fill="#e8d5ff"/>
        <circle cx="159" cy="99" r="0.8" fill="#c4a0ff"/>
        <circle cx="153" cy="114" r="1" fill="#a855f7"/>
        <circle cx="51" cy="87" r="1" fill="#c4a0ff"/>
        <circle cx="41" cy="103" r="1.2" fill="#e8d5ff"/>
        <circle cx="47" cy="119" r="0.8" fill="#a855f7"/>
        <circle cx="100" cy="154" r="1.5" fill="#e8d5ff"/>
        <circle cx="84" cy="141" r="1" fill="#c4a0ff"/>
        <circle cx="116" cy="143" r="1.2" fill="#d4b8ff"/>
      </g>
      <!-- Constellation lines -->
      <g opacity="0.28" stroke="#a855f7" stroke-width="0.5" fill="none">
        <line x1="100" y1="46" x2="116" y2="57"/>
        <line x1="100" y1="46" x2="87" y2="61"/>
        <line x1="116" y1="57" x2="124" y2="73"/>
        <line x1="87" y1="61" x2="77" y2="69"/>
        <line x1="149" y1="84" x2="159" y2="99"/>
        <line x1="159" y1="99" x2="153" y2="114"/>
        <line x1="51" y1="87" x2="41" y2="103"/>
        <line x1="41" y1="103" x2="47" y2="119"/>
        <line x1="100" y1="154" x2="84" y2="141"/>
        <line x1="100" y1="154" x2="116" y2="143"/>
      </g>
      <!-- Diamond eye of prediction -->
      <g filter="url(#softglow)" transform="translate(100,100)" style="animation:diamond-breathe 3s ease-in-out infinite">
        <polygon points="0,-24 17,0 0,24 -17,0" fill="none" stroke="#7b2fff" stroke-width="1" opacity="0.75"/>
        <polygon points="0,-13 9,0 0,13 -9,0" fill="none" stroke="#bf7fff" stroke-width="0.8" opacity="0.9"/>
        <circle cx="0" cy="0" r="9" fill="url(#centerGlow)"/>
        <circle cx="0" cy="0" r="3.5" fill="#ede0ff" opacity="0.95"/>
        <line x1="0" y1="-24" x2="0" y2="24" stroke="#7b2fff" stroke-width="0.35" opacity="0.4"/>
        <line x1="-17" y1="0" x2="17" y2="0" stroke="#7b2fff" stroke-width="0.35" opacity="0.4"/>
      </g>
      <!-- Outer orbit -->
      <circle cx="100" cy="100" r="83" fill="none" stroke="#2d0055" stroke-width="0.5" stroke-dasharray="3,7" opacity="0.4"/>
      <!-- Orbiting dots -->
      <g transform="translate(100,100)">
        <circle r="2" fill="#a855f7" opacity="0.7" filter="url(#glow)" transform="rotate(0) translate(83,0)"/>
        <circle r="1.5" fill="#7b2fff" opacity="0.5" filter="url(#glow)" transform="rotate(180) translate(83,0)"/>
      </g>
    </svg>
  </div>
  <div class="splash-name">Society Void</div>
  <div class="splash-sub">touch to enter the void</div>
</div>

<!-- APP -->
<div id="app">
  <div class="sv-header">
    <div class="sv-logo-wrap">
      <!-- Small globe in header -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="36" height="36">
        <defs>
          <radialGradient id="hg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#4a0080" stop-opacity="0.8"/><stop offset="100%" stop-color="#000" stop-opacity="0"/></radialGradient>
          <radialGradient id="hc" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#bf7fff"/><stop offset="100%" stop-color="#3d0080" stop-opacity="0"/></radialGradient>
          <clipPath id="hcc"><circle cx="100" cy="100" r="72"/></clipPath>
        </defs>
        <circle cx="100" cy="100" r="85" fill="url(#hg)"/>
        <circle cx="100" cy="100" r="72" fill="rgba(4,0,12,0.95)"/>
        <circle cx="100" cy="100" r="72" fill="none" stroke="#7b2fff" stroke-width="0.6" opacity="0.5"/>
        <g clip-path="url(#hcc)" opacity="0.2" stroke="#a855f7" stroke-width="0.5" fill="none">
          <ellipse cx="100" cy="100" rx="72" ry="22"/>
          <ellipse cx="100" cy="100" rx="22" ry="72"/>
          <line x1="28" y1="100" x2="172" y2="100"/>
          <line x1="100" y1="28" x2="100" y2="172"/>
        </g>
        <g transform="translate(100,100)">
          <polygon points="0,-20 14,0 0,20 -14,0" fill="none" stroke="#7b2fff" stroke-width="1.2" opacity="0.8"/>
          <circle cx="0" cy="0" r="8" fill="url(#hc)"/>
          <circle cx="0" cy="0" r="3" fill="#ede0ff" opacity="0.95"/>
        </g>
      </svg>
      <div class="sv-logo-text">Society Void</div>
    </div>
    <div class="sv-tagline">
      <span class="sv-dot"></span>
      emotion · economy · prediction
      <span class="sv-dot" style="animation-delay:0.8s"></span>
    </div>
  </div>

  <div class="sv-panel">
    <div class="sv-label">signal input</div>
    <textarea class="sv-input" id="scenario" rows="3" placeholder="describe the event… a decision, announcement, collapse, discovery"></textarea>
    <div class="sv-chips" id="chips"></div>
  </div>

  <div class="sv-panel">
    <div class="sv-label" id="cul-label">societies · 3 selected</div>
    <div class="sv-cultures" id="cultures"></div>
  </div>

  <button class="sv-btn" id="runBtn" onclick="runSim()">◇ &nbsp; simulate emotional impact</button>
  <div class="sv-error" id="error" style="display:none;"></div>
  <div id="results"></div>
  <div class="sv-footer">society void · emotion-to-economy engine · © 2025</div>
</div>

<script>
const CULTURES=[
  {id:"us",flag:"🇺🇸",name:"United States",desc:"Individualist, media-driven"},
  {id:"de",flag:"🇩🇪",name:"Germany",desc:"Consensus-seeking, pragmatic"},
  {id:"jp",flag:"🇯🇵",name:"Japan",desc:"Harmony-focused, indirect"},
  {id:"br",flag:"🇧🇷",name:"Brazil",desc:"Emotional, communal"},
  {id:"cn",flag:"🇨🇳",name:"China",desc:"Collective, nationalistic"},
  {id:"ro",flag:"🇷🇴",name:"Romania",desc:"Skeptical, resilient"},
  {id:"in",flag:"🇮🇳",name:"India",desc:"Aspirational, diverse"},
  {id:"uk",flag:"🇬🇧",name:"United Kingdom",desc:"Reserved, ironic"},
];
const QUICK=[
  "Elon Musk announces Starlink free internet globally",
  "A major bank collapses unexpectedly in Europe",
  "AI replaces 30% of white-collar jobs within 2 years",
  "A government mandates 4-day work week nationally",
  "A pharma company cures a major chronic disease",
];
const ECOLORS={Fear:"#ff2d55",Anger:"#ff6b35",Hope:"#7fff6e",Trust:"#00d4ff",Disgust:"#b060ff",Surprise:"#ffd700",Anxiety:"#ff9500",Euphoria:"#00ffcc"};
let selected=["us","de","ro"];

// STARFIELD
(function(){
  const c=document.getElementById("starfield"),ctx=c.getContext("2d");let stars=[];
  function init(){c.width=window.innerWidth;c.height=window.innerHeight;stars=[];for(let i=0;i<150;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*0.9+0.1,o:Math.random()*0.35+0.04});}
  function draw(){ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,160,255,${s.o})`;ctx.fill();s.o+=(Math.random()-0.5)*0.018;s.o=Math.max(0.02,Math.min(0.42,s.o));});requestAnimationFrame(draw);}
  window.addEventListener("resize",init);init();
  setTimeout(()=>{c.style.opacity="1";draw();},1400);
})();

// SPLASH PARTICLES
(function(){
  const splash=document.getElementById("splash"),pc=document.getElementById("particles-canvas"),ctx=pc.getContext("2d");
  pc.width=window.innerWidth;pc.height=window.innerHeight;
  let particles=[],animating=false;
  function explode(){
    const cx=pc.width/2,cy=pc.height/2;
    for(let i=0;i<350;i++){
      const angle=Math.random()*Math.PI*2,speed=Math.random()*9+2;
      particles.push({x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1,decay:Math.random()*0.014+0.007,size:Math.random()*2.2+0.4,color:`hsla(${255+Math.random()*50},85%,${55+Math.random()*35}%,`});
    }
    animating=true;animate();
  }
  function animate(){
    if(!animating)return;
    ctx.clearRect(0,0,pc.width,pc.height);let alive=false;
    particles.forEach(p=>{if(p.life<=0)return;alive=true;p.x+=p.vx;p.y+=p.vy;p.vx*=0.97;p.vy*=0.97;p.life-=p.decay;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle=p.color+Math.max(0,p.life)+")";ctx.fill();});
    if(alive)requestAnimationFrame(animate);else{pc.style.opacity="0";animating=false;}
  }
  splash.addEventListener("click",()=>{
    explode();
    setTimeout(()=>{splash.style.opacity="0";setTimeout(()=>{splash.style.display="none";document.getElementById("app").classList.add("visible");},1200);},150);
  });
})();

// CHIPS
const chipsEl=document.getElementById("chips");
QUICK.forEach(q=>{const b=document.createElement("button");b.className="sv-chip";b.textContent=q.slice(0,36)+"…";b.onclick=()=>document.getElementById("scenario").value=q;chipsEl.appendChild(b);});

const FLAG_STYLE='width:28px;height:20px;border-radius:2px;object-fit:cover;display:block;margin-bottom:5px;';
const FLAGS={
  us:`<span style="font-size:24px;line-height:1;display:block;margin-bottom:5px;">🇺🇸</span>`,
  de:`<span style="font-size:24px;line-height:1;display:block;margin-bottom:5px;">🇩🇪</span>`,
  jp:`<span style="font-size:24px;line-height:1;display:block;margin-bottom:5px;">🇯🇵</span>`,
  br:`<span style="font-size:24px;line-height:1;display:block;margin-bottom:5px;">🇧🇷</span>`,
  cn:`<span style="font-size:24px;line-height:1;display:block;margin-bottom:5px;">🇨🇳</span>`,
  ro:`<span style="font-size:24px;line-height:1;display:block;margin-bottom:5px;">🇷🇴</span>`,
  in:`<span style="font-size:24px;line-height:1;display:block;margin-bottom:5px;">🇮🇳</span>`,
  uk:`<span style="font-size:24px;line-height:1;display:block;margin-bottom:5px;">🇬🇧</span>`,
};
function renderCultures(){
  const el=document.getElementById("cultures");el.innerHTML="";
  document.getElementById("cul-label").textContent=`societies · ${selected.length} selected`;
  CULTURES.forEach(c=>{
    const on=selected.includes(c.id),d=document.createElement("button");
    d.className="sv-cul"+(on?" on":"");
    d.innerHTML=`${FLAGS[c.id]||""}<div class="sv-cul-check">✓</div><div class="sv-cul-name">${c.name}</div><div class="sv-cul-desc">${c.desc}</div>`;
    d.onclick=()=>{if(on){if(selected.length>1)selected=selected.filter(x=>x!==c.id);}else{if(selected.length<5)selected.push(c.id);}renderCultures();};
    el.appendChild(d);
  });
}
renderCultures();

const FLAG_MAP={"United States":"us","Germany":"de","Japan":"jp","Brazil":"br","China":"cn","Romania":"ro","India":"in","United Kingdom":"gb"};
function flagImg(name){const code=FLAG_MAP[name]||"un";return `<img src="https://flagcdn.com/w40/${code}.png" style="width:24px;height:16px;border-radius:2px;object-fit:cover;vertical-align:middle;margin-right:4px;">`;}
function eColor(e){return ECOLORS[e]||"#a855f7";}
function impColor(v){return v>0?"#7fff6e":v<0?"#ff2d55":"rgba(212,200,255,0.18)";}
function barHTML(label,val,color){
  const w=Math.min(100,Math.abs(val)),display=(val>0?"+":"")+Math.abs(val)+"%";
  return `<div class="sv-bar"><div class="sv-bar-meta"><span class="sv-bar-name">${label}</span><span class="sv-bar-val" style="color:${color}">${display}</span></div><div class="sv-bar-track"><div class="sv-bar-fill" style="width:${w}%;background:${color};opacity:0.65;box-shadow:0 0 5px ${color}33;"></div></div></div>`;
}

async function runSim(){
  const scenario=document.getElementById("scenario").value.trim();
  if(!scenario){showError("signal required · enter an event");return;}
  const btn=document.getElementById("runBtn");
  btn.disabled=true;document.getElementById("error").style.display="none";
  document.getElementById("results").innerHTML=`<div class="sv-loading"><div class="sv-orbit"></div><span id="loadmsg">scanning signal</span></div>`;
  const steps=["scanning signal","mapping emotions","modeling attitudes","projecting impact"];
  let si=0;const iv=setInterval(()=>{si=(si+1)%steps.length;const m=document.getElementById("loadmsg");if(m)m.textContent=steps[si];},800);
  const cultures=CULTURES.filter(c=>selected.includes(c.id));
  try{
    const res=await fetch("/api/simulate",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({scenario,cultures:cultures.map(c=>({name:c.name,desc:c.desc}))})
    });
    const data=await res.json();clearInterval(iv);
    if(data.error)throw new Error(data.error);
    renderResults(data);btn.disabled=false;btn.innerHTML="◇ &nbsp; simulate emotional impact";
  }catch(e){
    clearInterval(iv);btn.disabled=false;btn.innerHTML="◇ &nbsp; simulate emotional impact";
    showError("simulation failed · "+(e.message||"unknown error"));
  }
}

function showError(msg){const el=document.getElementById("error");el.textContent="◇ "+msg;el.style.display="block";}

function renderResults(data){
  const el=document.getElementById("results");let html=`<div>`;
  html+=`<div class="sv-divider"><div class="sv-div-line"></div><span class="sv-div-text">signal decoded</span><div class="sv-div-line"></div></div>`;
  if(data.global_emotions?.length){
    html+=`<div class="sv-label" style="margin-bottom:12px">emotional climate</div><div class="sv-emotions">`;
    data.global_emotions.forEach((e,i)=>{const col=eColor(e.name);html+=`<div class="sv-epill" style="background:${col}0c;border:1px solid ${col}1f;animation-delay:${i*0.07}s"><span class="sv-ename" style="color:${col}">${e.name}</span><span class="sv-epct" style="color:${col}">${Math.round(e.intensity)}%</span><span class="sv-eatt">${e.attitude||""}</span></div>`;});
    html+=`</div>`;
  }
  html+=`<div class="sv-label" style="margin-bottom:12px">${data.cultures?.length||0} societies · resonance map</div>`;
  (data.cultures||[]).forEach((c,i)=>{
    const col=eColor(c.dominant_emotion),imp=c.economic_impact||{};
    html+=`<div class="sv-ccard" style="border-left-color:${col}3a;animation-delay:${i*0.09}s">
      <div class="sv-ccard-top"><span class="sv-cflag">${flagImg(c.name)}</span><div><div class="sv-cname">${c.name}</div><div class="sv-cemotion" style="color:${col}"><span class="sv-pulse" style="background:${col};box-shadow:0 0 4px ${col}"></span>${(c.dominant_emotion||"").toLowerCase()}</div></div></div>
      <p class="sv-cprofile">${c.emotional_profile||""}</p>
      <div class="sv-attitude">attitude · <span>${c.attitude||""}</span></div>
      <div class="sv-label" style="margin-bottom:9px">economic resonance</div>
      ${barHTML("consumer spending",imp.consumer_spending||0,impColor(imp.consumer_spending||0))}
      ${barHTML("investment flow",imp.investment_flow||0,impColor(imp.investment_flow||0))}
      ${barHTML("market sentiment",imp.market_sentiment||0,impColor(imp.market_sentiment||0))}
      ${barHTML("social stability",imp.social_stability||0,impColor(imp.social_stability||0))}
    </div>`;
  });
  const f=data.global_economic_forecast||{};
  if(f.short_term){
    html+=`<div class="sv-panel" style="margin-top:6px"><div class="sv-label">global forecast</div>
      <div class="sv-forecast-grid">
        <div class="sv-fbox"><div class="sv-ftitle" style="color:rgba(255,107,53,0.55)">30 days</div><p class="sv-ftext">${f.short_term}</p></div>
        <div class="sv-fbox"><div class="sv-ftitle" style="color:rgba(0,212,255,0.45)">12 months</div><p class="sv-ftext">${f.long_term}</p></div>
      </div>
      <div class="sv-sectors">
        <div><div class="sv-sector-title" style="color:rgba(127,255,110,0.9)">▲ ascending</div>${(f.winning_sectors||[]).map(s=>`<div class="sv-sector-tag" style="border-left-color:rgba(127,255,110,0.25);color:rgba(127,255,110,0.95)">${s}</div>`).join("")}</div>
        <div><div class="sv-sector-title" style="color:rgba(255,80,110,0.9)">▼ descending</div>${(f.losing_sectors||[]).map(s=>`<div class="sv-sector-tag" style="border-left-color:rgba(255,45,85,0.25);color:rgba(255,80,110,0.95)">${s}</div>`).join("")}</div>
      </div>
      <div class="sv-opp"><span class="sv-label" style="margin:0">opportunity</span><div style="display:flex;align-items:center;gap:10px"><div class="sv-opp-track"><div class="sv-opp-fill" style="width:${f.opportunity_score||0}%"></div></div><span class="sv-opp-score">${f.opportunity_score||0}</span></div></div>
    </div>`;
  }
  if(data.strategic_verdict){
    html+=`<div class="sv-verdict"><div class="sv-verdict-label">◇ strategic signal</div><p class="sv-verdict-text">${data.strategic_verdict}</p></div>`;
  }
  html+=`<button class="sv-reset" onclick="resetSim()">◇ &nbsp; new signal</button></div>`;
  el.innerHTML=html;
}
function resetSim(){document.getElementById("results").innerHTML="";document.getElementById("scenario").value="";document.getElementById("error").style.display="none";window.scrollTo({top:0,behavior:"smooth"});}
</script>
